<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prestamos - Biblioteca Escolar</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
  <header class="barra">
    <div class="contenedor">
      <a class="marca" href="inicio.html">Biblioteca Escolar</a>
      <nav class="nav">
        <a href="inicio.html">Inicio</a>
        <a href="libros.html">Libros</a>
        <button id="cerrarSesion" type="button">Salir</button>
      </nav>
    </div>
  </header>
  <main class="contenedor">
    <div class="acciones">
      <h1>Prestamos</h1>
      <a class="boton" href="prestamos-registrar.html">Nuevo prestamo</a>
    </div>
    <label>Buscar por usuario, libro o estado
      <input type="search" id="buscador" placeholder="Ej. activo">
    </label>
    <table>
      <thead>
        <tr>
          <th>Usuario</th>
          <th>Libro</th>
          <th>Prestamo</th>
          <th>Devolucion</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tablaPrestamos"></tbody>
    </table>
    <p class="mensaje" id="mensaje"></p>
  </main>
  <script src="js/prestamos.js"></script>
</body>
</html>
